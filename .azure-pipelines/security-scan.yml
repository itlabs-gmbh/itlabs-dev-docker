# ─────────────────────────────────────────────────────────────────────────────
# Security & Quality Pipeline
# Runs on every PR and push to main.
# Jobs: hadolint, shellcheck, semgrep, trivy
# Stage 3 (main only): multiarch build (amd64 + arm64) → push to ACR
# ─────────────────────────────────────────────────────────────────────────────
trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool: Default

# ── Shared variables ──────────────────────────────────────────────────────────
variables:
  ACR_HOST: itlabscr.azurecr.io
  ACR_NAME: itlabscr
  # Name of the Azure Container Registry service connection in ADO
  ACR_SERVICE_CONNECTION: itlabscr-1955
  IMAGE_NAME: itlabs-dev
  IMAGE_TAG: $(Build.BuildId)
  FULL_IMAGE: $(ACR_HOST)/$(IMAGE_NAME):$(IMAGE_TAG)

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 – Static analysis (no Docker build needed)
# ─────────────────────────────────────────────────────────────────────────────
stages:
  - stage: StaticAnalysis
    displayName: Static Analysis
    jobs:

      # ── Hadolint – Dockerfile linting ────────────────────────────────────────
      - job: Hadolint
        displayName: Hadolint (Dockerfile)
        steps:
          - checkout: self

          - script: |
              docker run --rm -i \
                -v "$(Build.SourcesDirectory):/workspace" \
                hadolint/hadolint:latest \
                hadolint \
                  --format sarif \
                  --failure-threshold error \
                  /workspace/Dockerfile \
                > hadolint.sarif
            displayName: Run Hadolint
            continueOnError: true

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: hadolint.sarif
              artifactName: hadolint-sarif
            displayName: Publish Hadolint SARIF

      # ── ShellCheck – Shell script analysis ───────────────────────────────────
      - job: ShellCheck
        displayName: ShellCheck (Shell scripts)
        steps:
          - checkout: self

          - script: |
              docker run --rm \
                -v "$(Build.SourcesDirectory):/mnt" \
                koalaman/shellcheck-alpine:stable \
                shellcheck \
                  --format=gcc \
                  /mnt/install.sh
            displayName: Run ShellCheck (install.sh)
            # setup.sh uses #!/bin/zsh which ShellCheck does not support (SC1071)

      # ── Semgrep – SAST ───────────────────────────────────────────────────────
      - job: Semgrep
        displayName: Semgrep (SAST)
        steps:
          - checkout: self

          - script: |
              pip install semgrep --quiet
              semgrep scan \
                --config auto \
                --sarif \
                --output semgrep.sarif \
                --error \
                $(Build.SourcesDirectory)
            displayName: Run Semgrep
            continueOnError: true

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: semgrep.sarif
              artifactName: semgrep-sarif
            displayName: Publish Semgrep SARIF

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2 – Build (amd64 only) & Trivy image scan
  # ─────────────────────────────────────────────────────────────────────────────
  - stage: ImageScan
    displayName: Build & Image Scan
    dependsOn: StaticAnalysis
    condition: succeeded()
    jobs:

      - job: TrivyScan
        displayName: Trivy (Container Image)
        steps:
          - checkout: self

          - script: |
              docker build --tag $(FULL_IMAGE) .
            displayName: Build Docker Image (amd64)

          - script: |
              docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v "$(Build.SourcesDirectory):/workspace" \
                aquasec/trivy:latest \
                image \
                  --exit-code 0 \
                  --severity LOW,MEDIUM \
                  --ignore-unfixed \
                  --format sarif \
                  --output /workspace/trivy-low-medium.sarif \
                  $(FULL_IMAGE)
            displayName: Trivy Scan (LOW/MEDIUM – report only)

          - script: |
              docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v "$(Build.SourcesDirectory):/workspace" \
                aquasec/trivy:latest \
                image \
                  --exit-code 0 \
                  --severity HIGH,CRITICAL \
                  --ignore-unfixed \
                  --format sarif \
                  --output /workspace/trivy-high-critical.sarif \
                  $(FULL_IMAGE)
            displayName: Trivy Scan (HIGH/CRITICAL – generate SARIF)

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: trivy-low-medium.sarif
              artifactName: trivy-low-medium-sarif
            displayName: Publish Trivy LOW/MEDIUM SARIF
            condition: always()

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: trivy-high-critical.sarif
              artifactName: trivy-high-critical-sarif
            displayName: Publish Trivy HIGH/CRITICAL SARIF
            condition: always()

          - script: |
              docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                aquasec/trivy:latest \
                image \
                  --exit-code 1 \
                  --severity HIGH,CRITICAL \
                  --ignore-unfixed \
                  $(FULL_IMAGE)
            displayName: Trivy Scan (HIGH/CRITICAL – fail on patchable findings)

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 3 – Multiarch build (amd64 + arm64) & push to ACR
  # Only runs on pushes to main, not on PRs.
  # ─────────────────────────────────────────────────────────────────────────────
  - stage: BuildAndPush
    displayName: Multiarch Build & Push to ACR
    dependsOn: ImageScan
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:

      - job: MultiarchPush
        displayName: buildx → linux/amd64 + linux/arm64 → ACR
        steps:
          - checkout: self

          # Log in to ACR via service connection
          - task: Docker@2
            displayName: ACR Login
            inputs:
              command: login
              containerRegistry: $(ACR_SERVICE_CONNECTION)

          # Enable QEMU for cross-platform emulation (arm64 on amd64 host)
          - script: |
              docker run --rm --privileged \
                multiarch/qemu-user-static \
                --reset -p yes
            displayName: Setup QEMU

          # Create and activate a buildx builder with multi-platform support
          - script: |
              docker buildx create \
                --name multiarch-builder \
                --driver docker-container \
                --use
              docker buildx inspect --bootstrap
            displayName: Create buildx builder

          # Build & push multiarch manifest + per-arch images
          - script: |
              docker buildx build \
                --platform linux/amd64,linux/arm64 \
                --tag $(FULL_IMAGE) \
                --tag $(ACR_HOST)/$(IMAGE_NAME):latest \
                --push \
                .
            displayName: Build & Push multiarch image

          # Tag with git short SHA for traceability
          - script: |
              GIT_SHA=$(git rev-parse --short HEAD)
              docker buildx build \
                --platform linux/amd64,linux/arm64 \
                --tag $(ACR_HOST)/$(IMAGE_NAME):${GIT_SHA} \
                --push \
                .
            displayName: Tag & Push with git SHA
