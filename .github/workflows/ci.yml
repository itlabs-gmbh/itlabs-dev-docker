# ─────────────────────────────────────────────────────────────────────────────
# Security & Quality Pipeline
# Runs on every PR and push to main.
# Jobs: hadolint, shellcheck, semgrep, trivy
# Stage 3 (main only): multiarch build (amd64 + arm64) → push to GHCR
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/itlabs-dev

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 – Static analysis
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  hadolint:
    name: Hadolint (Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint
        run: |
          docker run --rm -i \
            -v "${{ github.workspace }}:/workspace" \
            hadolint/hadolint:latest \
            hadolint \
              --format sarif \
              --failure-threshold error \
              /workspace/Dockerfile \
            > hadolint.sarif
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: hadolint-sarif
          path: hadolint.sarif

  shellcheck:
    name: ShellCheck (Shell scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck (install.sh)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/mnt" \
            koalaman/shellcheck-alpine:stable \
            shellcheck \
              --format=gcc \
              /mnt/install.sh
        # setup.sh uses #!/bin/zsh which ShellCheck does not support (SC1071)

  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep --quiet
          semgrep scan \
            --config auto \
            --sarif \
            --output semgrep.sarif \
            --error \
            .
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 – Build (amd64) & Trivy image scan
# ─────────────────────────────────────────────────────────────────────────────
  trivy:
    name: Trivy (Container Image)
    runs-on: ubuntu-latest
    needs: [hadolint, shellcheck, semgrep]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image (amd64)
        run: docker build --tag itlabs-dev:${{ github.run_id }} .

      - name: Trivy Scan (LOW/MEDIUM – report only)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/workspace" \
            aquasec/trivy:latest \
            image \
              --exit-code 0 \
              --severity LOW,MEDIUM \
              --ignore-unfixed \
              --ignorefile /workspace/.trivyignore \
              --format sarif \
              --output /workspace/trivy-low-medium.sarif \
              itlabs-dev:${{ github.run_id }}

      - name: Trivy Scan (HIGH/CRITICAL – generate SARIF)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/workspace" \
            aquasec/trivy:latest \
            image \
              --exit-code 0 \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --ignorefile /workspace/.trivyignore \
              --format sarif \
              --output /workspace/trivy-high-critical.sarif \
              itlabs-dev:${{ github.run_id }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-low-medium-sarif
          path: trivy-low-medium.sarif

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-high-critical-sarif
          path: trivy-high-critical.sarif

      - name: Trivy Scan (HIGH/CRITICAL – fail on patchable findings)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/workspace" \
            aquasec/trivy:latest \
            image \
              --exit-code 1 \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --ignorefile /workspace/.trivyignore \
              itlabs-dev:${{ github.run_id }}

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3 – Multiarch build (amd64 + arm64) & push to GHCR
# Only runs on pushes to main, not on PRs.
# ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Multiarch Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: [trivy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Create buildx builder
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.run_id }}
            type=sha,format=short

      - name: Build & Push multiarch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
